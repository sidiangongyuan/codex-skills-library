name: Bug report
description: Report a broken skill, installer problem, or documentation error.
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Skill behavior
        - Installation
        - Catalog or documentation
        - Validation or CI
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Skill name
      description: Leave blank when the issue is repository-wide.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe sequence that shows the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Codex surface, operating system, Python version, and relevant tools.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private workspace data, and unpublished material.
          required: true
