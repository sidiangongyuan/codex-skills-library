name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Compile tooling
        run: >-
          python -c "from pathlib import Path; import py_compile;
          files=[p for p in Path('.').rglob('*.py') if '__pycache__' not in p.parts];
          [py_compile.compile(str(p), doraise=True) for p in files];
          print(f'compiled {len(files)} Python files')"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate repository
        run: python scripts/validate.py

      - name: Check generated catalog documentation
        run: python scripts/catalog.py --check

      - name: Validate a full dry-run installation
        run: python scripts/install.py --all --dry-run --target "${{ runner.temp }}/codex-skills"
